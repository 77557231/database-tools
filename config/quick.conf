# config/quick.conf - Quick acceptance mode configuration
# Dependencies: sysbench only
# Duration: 5-10 minutes

# Mode configuration
MODE=quick
OUTPUT_DIR="./output"
FORMAT="txt"
CLEANUP=true

# CPU test
CPU_ENABLED=true
CPU_DURATION=10
CPU_THREADS=0  # 0=auto-detect CPU cores
# CPU_MAX_PRIME: Maximum prime number to calculate (higher = more complex, longer test)
# Larger values provide more comprehensive CPU testing
CPU_MAX_PRIME=20000

# Memory test
MEMORY_ENABLED=true
MEMORY_DURATION=10
MEMORY_BLOCK_SIZE="8K"
MEMORY_TOTAL_SIZE="20G"
MEMORY_OPER="read"
MEMORY_THREADS=10

# IO test (sysbench fileio)
IO_ENABLED=true
IO_TOOL="sysbench"
IO_DURATION=10
IO_TOTAL_SIZE="100M"
IO_TEST_MODE="rndrw"
IO_FILE_NUM=1

# Threads test
THREADS_ENABLED=true
THREADS_DURATION=10
THREADS_NUM=100
# THREAD_YIELDS: Number of times each thread yields CPU (higher = more context switches)
THREAD_YIELDS=100
# THREAD_LOCKS: Number of shared locks to contend for (higher = more contention)
THREAD_LOCKS=4

# Mutex test
MUTEX_ENABLED=true
MUTEX_DURATION=10
MUTEX_NUM=1024
MUTEX_THREADS=100

# Network test
# NETWORK_ENABLED: Set to false for quick mode (single-machine test cannot measure real network bandwidth)
NETWORK_ENABLED=true
NETWORK_TOOL="iperf3"
# NETWORK_MODE: "single"=single machine loopback test, "multi-server"=multi-server distributed test
NETWORK_MODE="single"
NETWORK_DURATION=20
NETWORK_PORT=25201
NETWORK_PROTOCOL="tcp"
NETWORK_PARALLEL=1
# Auto-detect server IP (use hostname -I to get real IP)
# NETWORK_SERVER_IP will be auto-filled with machine's IP if not set
# NETWORK_CLIENT_IP is optional, if empty uses same as SERVER_IP (localhost test)
# Example for multiple clients: "172.16.53.128 172.16.53.129" (space-separated)

# Advanced configuration for multi-server mode
# SERVERS: List of servers in format "IP:ROLE:DESCRIPTION", multiple servers separated by commas
#   ROLE: "server" (iperf3 server) or "client" (iperf3 client)
#   DESCRIPTION: Optional description for the server
# Example: SERVERS="192.168.1.101:server:db,192.168.1.102:client:app,192.168.1.103:client:web"

# TEST_SCENARIOS: List of test scenarios in format "CLIENT_IP:SERVER_IP:DURATION", multiple scenarios separated by commas
#   DURATION: Optional, will use NETWORK_DURATION if not specified
# Example: TEST_SCENARIOS="192.168.1.102:192.168.1.101,192.168.1.103:192.168.1.101"

NETWORK_SERVER_IP=""
NETWORK_CLIENT_IP=""

# SERVERS=""
# TEST_SCENARIOS=""
