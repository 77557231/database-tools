# config/production.conf - 生产环境基线模式配置
# 依赖：sysbench + fio + iperf3
# 时长：30-60 分钟

# 模式配置
MODE=production
OUTPUT_DIR="./output"
FORMAT="txt"
CLEANUP=true

# CPU 测试
CPU_ENABLED=true
CPU_DURATION=120
CPU_THREADS=0
CPU_MAX_PRIME=20000

# 内存测试
MEMORY_ENABLED=true
MEMORY_DURATION=120
MEMORY_BLOCK_SIZE="1M"
MEMORY_TOTAL_SIZE="10G"
MEMORY_OPER="read"

# IO 测试（fio）
IO_ENABLED=true
IO_TOOL="fio"
IO_DURATION=900
IO_TEST_PATH="/tmp"
IO_FILE_SIZE="10G"

# FIO 测试配置（多 profile）
FIO_PROFILES="randread randwrite mixed_rw"

# randread 配置
FIO_RANDREAD_RW="randread"
FIO_RANDREAD_BS="8K"
FIO_RANDREAD_IODEPTH=64
FIO_RANDREAD_NUMJOBS=4

# randwrite 配置
FIO_RANDWRITE_RW="randwrite"
FIO_RANDWRITE_BS="8K"
FIO_RANDWRITE_IODEPTH=32
FIO_RANDWRITE_NUMJOBS=4

# mixed_rw 配置
FIO_MIXED_RW_RW="randrw"
FIO_MIXED_RW_RWMIXREAD=70
FIO_MIXED_RW_BS="8K"
FIO_MIXED_RW_IODEPTH=64
FIO_MIXED_RW_NUMJOBS=4

# 网络测试
NETWORK_ENABLED=true
NETWORK_TOOL="iperf3"
NETWORK_MODE="single"
NETWORK_DURATION=120
NETWORK_PORT=5201
NETWORK_PROTOCOL="tcp"
NETWORK_PARALLEL=4
# NETWORK_SERVER_IP="192.168.1.100"  # 需要指定服务器 IP

# 线程测试
THREADS_ENABLED=true
THREADS_DURATION=60
THREAD_YIELDS=100
THREAD_LOCKS=4

# 互斥锁测试
MUTEX_ENABLED=true
MUTEX_DURATION=60
MUTEX_NUM=1024
MUTEX_MAX=10000
