# Database System Benchmark Configuration
# This is the unified configuration file for vb_benchmark
# All parameters can be overridden by command line arguments in KEY=VALUE format

################################################################################
# Core Parameters
################################################################################

# Unified test duration (seconds)
# All tests except pgbench and fio will use this duration
# Longer duration provides more accurate results, but takes more time
DURATION=10

################################################################################
# CPU Test Configuration
################################################################################

# Enable CPU test
CPU_ENABLED=true

# Number of CPU test threads (0 = auto-detect, use all available cores)
# Set to 0 for best performance testing, or specific number for controlled testing
CPU_THREADS=0

# Maximum prime number to calculate (higher = more complex, longer test)
# Larger values provide more comprehensive CPU testing
# Recommended values: 10000 (quick), 20000 (standard), 100000 (comprehensive)
CPU_MAX_PRIME=20000

################################################################################
# Memory Test Configuration
################################################################################

# Enable memory test
MEMORY_ENABLED=true

# Number of memory test threads (0 = auto-detect, use all available cores)
MEMORY_THREADS=0

# Memory block size for testing
# Common values: 1K, 4K, 8K, 16K, 32K
MEMORY_BLOCK_SIZE=8K

# Total memory size to test (should be less than available system memory)
# Recommended: 20G for systems with 32G+ memory, 10G for 16G systems
MEMORY_TOTAL_SIZE=20G

# Memory operation type: read, write, or rw (read-write)
MEMORY_OPER=read

################################################################################
# IO Test Configuration
################################################################################

# Enable IO test
IO_ENABLED=true

# IO testing tool: sysbench or fio
# sysbench: simpler, faster results
# fio: more comprehensive, professional IO testing
IO_TOOL=sysbench

# Total size of test file(s)
# For sysbench: total size of all test files
# For fio: size per job
IO_TOTAL_SIZE=1G

# IO test mode (sysbench only)
# Options: seqwr, seqrd, rndwr, rndrd, rndrw
# seqwr: sequential write
# seqrd: sequential read
# rndwr: random write
# rndrd: random read
# rndrw: random read-write (50/50 split)
IO_TEST_MODE=rndrw

# Number of test files (sysbench only)
IO_FILE_NUM=1

# Test directory path
# Should be on the target disk/partition you want to test
# Default: /tmp (tmpfs, may be in memory)
# For real disk testing, use a path on your actual storage
IO_TEST_PATH=/tmp

################################################################################
# FIO Configuration (used when IO_TOOL=fio)
################################################################################

# FIO test duration (seconds)
# Typically longer than other tests for more accurate IO results
FIO_DURATION=300

# FIO test profiles to run
# Space-separated list of profiles
# Available profiles: randread, randwrite, mixed_rw
FIO_PROFILES="randread randwrite"

# Random read configuration
FIO_RANDREAD_RW=randread
FIO_RANDREAD_BS=8K         # Block size
FIO_RANDREAD_IODEPTH=64     # IO depth (queue depth)
FIO_RANDREAD_NUMJOBS=4      # Number of parallel jobs

# Random write configuration
FIO_RANDWRITE_RW=randwrite
FIO_RANDWRITE_BS=8K         # Block size
FIO_RANDWRITE_IODEPTH=64     # IO depth (queue depth)
FIO_RANDWRITE_NUMJOBS=4      # Number of parallel jobs

################################################################################
# Network Test Configuration
################################################################################

# Enable network test
# Set to true only when you have network client IPs configured
NETWORK_ENABLED=true

# Network testing tool (currently only iperf3 is supported)
NETWORK_TOOL=iperf3

# Network test mode: single or multi-server
# single: single server with multiple clients
# multi-server: multiple servers (not fully implemented yet)
NETWORK_MODE=single



# Network test port
NETWORK_PORT=25201

# Number of parallel network connections
NETWORK_PARALLEL=1

# Network protocol: tcp or udp
NETWORK_PROTOCOL=tcp

################################################################################
# Threads Test Configuration
################################################################################

# Enable threads test
THREADS_ENABLED=true

# Number of threads to create
# Higher values stress thread scheduling more
THREADS_NUM=1000

# Number of yields per thread
# Controls how often threads yield to other threads
THREADS_YIELDS=100

# Number of locks per thread
# Controls contention for shared resources
THREADS_LOCKS=4

################################################################################
# Mutex Test Configuration
################################################################################

# Enable mutex test
MUTEX_ENABLED=true

# Number of mutex test threads (0 = auto-detect)
MUTEX_THREADS=0

# Number of mutexes to test
# Controls the complexity of the mutex test
MUTEX_NUM=1024

################################################################################
# pgbench Test Configuration
################################################################################

# Enable pgbench test
# Requires PostgreSQL to be installed and accessible
PGBENCH_ENABLED=false

# pgbench database name
# Will be created if it doesn't exist
PGBENCH_DB=pgbench_db

# Number of pgbench threads (0 = auto-detect, use CPU core count)
PGBENCH_THREADS=0

# pgbench test duration (seconds)
PGBENCH_DURATION=300

################################################################################
# Output Configuration
################################################################################

# Output directory for test results and reports
OUTPUT_DIR=./output

# Output format (currently only txt is supported)
FORMAT=txt

# Clean up test files after testing
CLEANUP=true
